# ReadTheDocs build configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    post_install:
      # Install the package itself so autodoc can import all modules.
      # Heavy optional deps (tensorflow, stable-retro) are not pulled in here;
      # autodoc mock imports in conf.py handle those at build time.
      - pip install -e ".[docs]"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
